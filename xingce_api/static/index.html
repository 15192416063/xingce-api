<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>行测智能题库 · 上岸助手</title>
<style>
:root{--blue:#c96442;--blue-d:#a8492c;--bg:#f0eee6;--card:#fffdf8;--ink:#2b2a27;
 --muted:#86847c;--line:#e6e1d5;--ok:#5a7d4f;--bad:#bb5340;--gold:#bd8a3a;
 --serif:"Songti SC","Noto Serif SC",Georgia,"Times New Roman",serif;}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,"Microsoft YaHei",sans-serif;
 background:var(--bg);color:var(--ink);font-size:14px}
.serif{font-family:var(--serif)}
a{color:inherit;text-decoration:none}
/* 登录门 */
.gate{position:fixed;inset:0;background:linear-gradient(120deg,#efe9dc,#e3d4c2);
 display:flex;align-items:center;justify-content:center;z-index:50}
.gate .box{background:var(--card);border-radius:16px;padding:30px 32px;width:340px;box-shadow:0 20px 60px rgba(80,60,40,.18)}
.gate h1{margin:0 0 4px;font-size:23px;color:var(--ink);font-family:var(--serif);font-weight:600}.gate p{margin:0 0 18px;color:var(--muted);font-size:13px}
.gate input{width:100%;padding:11px;margin:7px 0;border:1px solid var(--line);border-radius:9px;font-size:15px}
.gate .btn{width:100%;margin-top:10px;padding:12px}
.gate .sw{text-align:center;margin-top:14px;color:var(--blue);cursor:pointer;font-size:13px}
.gate .err{color:var(--bad);font-size:13px;min-height:18px;margin-top:6px}
/* 布局 */
.app{display:flex;min-height:100vh}
.side{width:204px;background:#eae6da;color:#5c5a52;border-right:1px solid var(--line);
 position:fixed;top:0;bottom:0;left:0;padding:18px 0;display:flex;flex-direction:column}
.brand{font-family:var(--serif);font-size:19px;font-weight:600;color:var(--ink);padding:0 20px 14px}
.brand small{display:block;font-size:11px;color:#86847c;font-weight:400;margin-top:4px;font-family:system-ui}
.nav a{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;color:#5c5a52;border-left:3px solid transparent;font-size:14px}
.nav a:hover{background:rgba(201,100,66,.08);color:var(--ink)}
.nav a.on{background:rgba(201,100,66,.13);color:var(--blue-d);border-left-color:var(--blue);font-weight:600}
.ico{width:18px;text-align:center}
.side-foot{margin-top:auto;padding:14px 20px;font-size:11px;color:#86847c}
.side-foot .u{color:var(--ink);font-size:13px;margin-bottom:6px}
.side-foot .badge{display:inline-block;background:var(--gold);color:#fff;border-radius:4px;padding:1px 6px;font-size:11px}
.side-foot a{color:var(--blue);cursor:pointer}
.main{margin-left:204px;flex:1;padding:22px 34px;max-width:1060px}
h2.page{margin:0 0 18px;font-size:22px;font-family:var(--serif);font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(80,60,40,.05)}
.grid{display:grid;gap:14px}.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:820px){.g4,.g3,.g2{grid-template-columns:1fr 1fr}}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
.stat .n{font-size:26px;font-weight:700}.stat .l{color:var(--muted);font-size:12px;margin-top:4px}
.stat .n.blue{color:var(--blue)}.stat .n.gold{color:var(--gold)}.stat .n.ok{color:var(--ok)}.stat .n.bad{color:var(--bad)}
.hero{background:linear-gradient(110deg,#c96442,#d98a63);color:#fff;border:0}
.hero .days{font-size:46px;font-weight:800;line-height:1}.hero .sub{opacity:.9;margin-top:6px}
.btn{background:var(--blue);color:#fff;border:0;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:14px}
.btn:hover{background:var(--blue-d)}.btn:disabled{opacity:.5}
.btn.ghost{background:#eef2fb;color:var(--blue)}.btn.gray{background:#eceff5;color:#555}
.btn.sm{padding:5px 11px;font-size:13px}.btn.ok{background:var(--ok)}.btn.bad{background:var(--bad)}.btn.gold{background:var(--gold);color:#5a3d00}
input,select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff;outline:none}
input:focus,select:focus{border-color:var(--blue)}
.chip{display:inline-block;padding:3px 10px;border-radius:20px;background:#f3ece0;color:var(--blue);font-size:12px;margin:0 6px 6px 0;cursor:pointer}
.chip.on{background:var(--blue);color:#fff}
.tag{display:inline-block;background:#f3ece0;color:var(--blue);border-radius:5px;padding:2px 8px;font-size:12px;margin-right:6px}
.tag.diff{background:#fff4e5;color:#c9810a}
.q{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.q .stem{font-size:15px;line-height:1.9;margin:6px 0}
.q img{max-width:100%;max-height:360px;height:auto;width:auto;object-fit:contain;border:1px solid var(--line);border-radius:8px;margin:8px 0;background:#fff;display:block;cursor:zoom-in}
.q img.zoom{max-height:none}
.mat{background:#faf6ec;border-left:3px solid var(--blue);border-radius:6px;padding:10px 12px;margin-bottom:10px;color:#445;font-size:13px;line-height:1.8}
.q-foot{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.star{cursor:pointer;font-size:20px;color:#cfd6e4}.star.on{color:var(--gold)}
.opts{margin:8px 0}
.opt{border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin:7px 0;cursor:pointer;transition:.12s;font-size:14px}
.opt:hover{border-color:var(--blue);background:#faf6ec}
.opt b{color:var(--blue);margin-right:8px}
.opt.sel{border-color:var(--blue);background:#f3ece0}
.opt.correct{border-color:var(--ok);background:#eafaf0}.opt.correct b{color:var(--ok)}
.opt.wrong{border-color:var(--bad);background:#fdeeec}.opt.wrong b{color:var(--bad)}
.opts.done .opt{cursor:default}
/* AI 对话 */
.chatlog{max-height:none;margin-bottom:12px}
.bub{max-width:88%;padding:10px 14px;border-radius:12px;margin:8px 0;line-height:1.7;font-size:14px}
.bub.me{background:var(--blue);color:#fff;margin-left:auto;border-bottom-right-radius:3px}
.bub.ai{background:#efece2;color:#2b2a27;border-bottom-left-radius:3px}
.ana{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.chatbox{display:flex;gap:8px;align-items:flex-end}
.chatbox textarea{flex:1;height:54px;resize:vertical;padding:9px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px}
.pill{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:20px;padding:4px 12px;margin:3px 4px;font-size:12px;color:#555}
.hcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 8px 30px rgba(201,100,66,.14)}
.hcard .chatbox textarea{height:118px;font-size:15px;line-height:1.6}
.hcard .chatlog{max-height:46vh;overflow-y:auto}
.hcard .chatlog:empty{display:none}
.hcard .chatlog:not(:empty){margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--line)}
/* 右侧 artifact 题目集面板 */
.artifact{background:var(--card);border:1px solid var(--blue);border-radius:12px;padding:14px;margin-bottom:16px;box-shadow:0 4px 16px rgba(201,100,66,.12)}
.artifact h4{margin:0 0 4px;font-size:14px}
.art-it{font-size:12px;color:#5c5a52;padding:5px 0;border-bottom:1px dashed var(--line)}
.art-it:last-child{border-bottom:0}
/* Claude project 两栏:左对话 右我的题库 */
.proj{display:flex;gap:20px;align-items:flex-start;padding-top:10px}
.proj-main{flex:1;min-width:0}
.proj-side{width:330px;flex-shrink:0}
@media(max-width:900px){.proj{flex-direction:column}.proj-side{width:100%;position:static}}
.cap{height:6px;background:#eef1f7;border-radius:4px;overflow:hidden;margin:8px 0 4px}.cap>i{display:block;height:100%;background:var(--blue)}
.mine-it{padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;cursor:pointer;display:flex;gap:8px;align-items:flex-start}
.mine-it:hover{background:#f7faff}
.mine-it .mtag{flex-shrink:0;background:#f3ece0;color:var(--blue);border-radius:4px;padding:1px 6px;font-size:11px}
.mine-empty{color:var(--muted);text-align:center;padding:18px 0;font-size:13px}
.ovrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line);font-size:13px;color:#5c5a52}
.ovrow:last-child{border-bottom:0}.ovrow b{color:var(--ink)}
.res{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:13px;line-height:1.7}
.res.ok{background:#eafaf0;color:#15803d}.res.bad{background:#fdeeec;color:#b91c1c}.res.info{background:#f3ece0;color:#3355bb}
.bar{height:8px;background:#eef1f7;border-radius:6px;overflow:hidden}.bar>i{display:block;height:100%;background:var(--blue);border-radius:6px}
.barrow{display:flex;align-items:center;gap:10px;margin:8px 0}.barrow .nm{width:74px;color:#555;font-size:13px}.barrow .pct{width:46px;text-align:right;color:var(--muted);font-size:12px}
.trend{display:flex;align-items:flex-end;gap:8px;height:90px;margin-top:8px}.trend .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.trend .bk{width:60%;background:var(--blue);border-radius:4px 4px 0 0;min-height:2px}.trend .dt{font-size:10px;color:var(--muted)}
.muted{color:var(--muted)}.center{text-align:center}
.news-it{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.news-it .cat{flex-shrink:0;background:#f3ece0;color:var(--blue);border-radius:5px;padding:2px 8px;font-size:12px;height:fit-content}
.plan{border:2px solid var(--line);border-radius:12px;padding:20px;text-align:center}
.plan.hot{border-color:var(--gold);position:relative}
.plan .price{font-size:34px;font-weight:800;color:var(--blue)}.plan .price small{font-size:14px;color:var(--muted)}
.plan li{text-align:left;color:#555;margin:6px 0;list-style:none;font-size:13px}.plan ul{padding:0;margin:14px 0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 18px;border-radius:8px;opacity:0;transition:.3s;z-index:99;font-size:13px}
.toast.show{opacity:.95}
.upsell{background:linear-gradient(110deg,#fff7e6,#ffeccc);border:1px solid #f5d28a;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
</style>
</head>
<body>

<!-- 登录/注册门 -->
<div class="gate" id="gate">
 <div class="box">
   <h1>📘 行测智能题库</h1>
   <p id="gate-sub">登录后开始刷题上岸</p>
   <input id="g-user" placeholder="用户名(≥3位)" autocomplete="username">
   <input id="g-pass" type="password" placeholder="密码(≥6位)" autocomplete="current-password">
   <input id="g-code" placeholder="管理员邀请码(选填)" style="display:none">
   <button class="btn" id="g-btn" onclick="doAuth()">登录</button>
   <div class="err" id="g-err"></div>
   <div class="sw" id="g-sw" onclick="swAuth()">没有账号?去注册 →</div>
 </div>
</div>

<div class="app" id="appwrap" style="display:none">
 <aside class="side">
   <div class="brand">📘 行测智能题库<small>AI 切题 · 精准抠图 · 上岸助手</small></div>
   <nav class="nav" id="nav"></nav>
   <div class="side-foot">
     <div class="u" id="me-name"></div>
     <a onclick="go('membership')">💎 会员中心</a> · <a onclick="logout()">退出</a>
   </div>
 </aside>
 <main class="main" id="main"></main>
</div>
<div class="toast" id="toast"></div>

<script>
const API="";
let TOKEN=localStorage.getItem('xc_token')||'';
let USER=null, STATS=null, AUTH_MODE='login';
const $=(s,r=document)=>r.querySelector(s);
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
async function j(u,o={}){
 o.headers=Object.assign({},o.headers||{},TOKEN?{'Authorization':'Bearer '+TOKEN}:{});
 const r=await fetch(API+u,o);
 if(r.status===401){logout();throw new Error('登录已过期');}
 return r.json();
}
function showQ(s){let h=esc(s||'');h=h.replace(/^\s*\d{1,3}[\.、．]\s*/,'');
 h=h.replace(/\s*\d{1,3}[\.、．]\s*(?=A[\.、．])/,' ');
 h=h.replace(/[ABCD][\.、．]\s*(?=[ABCD][\.、．]|\s*$)/g,'');
 h=h.replace(/\s*(?=[ABCD][\.、．])/g,'\n');return h.replace(/\n/g,'<br>').trim();}

/* ---------- 认证 ---------- */
function swAuth(){AUTH_MODE=AUTH_MODE==='login'?'register':'login';
 $('#gate-sub').textContent=AUTH_MODE==='login'?'登录后开始刷题上岸':'注册新账号,免费开练';
 $('#g-btn').textContent=AUTH_MODE==='login'?'登录':'注册';
 $('#g-code').style.display=AUTH_MODE==='register'?'block':'none';
 $('#g-sw').textContent=AUTH_MODE==='login'?'没有账号?去注册 →':'已有账号?去登录 →';
 $('#g-err').textContent='';}
async function doAuth(){
 const fd=new FormData();fd.append('username',$('#g-user').value);fd.append('password',$('#g-pass').value);
 if(AUTH_MODE==='register')fd.append('admin_code',$('#g-code').value);
 const r=await j('/api/auth/'+AUTH_MODE,{method:'POST',body:fd});
 if(r.detail){$('#g-err').textContent=r.detail;return;}
 TOKEN=r.token;localStorage.setItem('xc_token',TOKEN);USER=r.user;boot();
}
function logout(){TOKEN='';localStorage.removeItem('xc_token');USER=null;
 $('#appwrap').style.display='none';$('#gate').style.display='flex';}
async function boot(){
 try{USER=await j('/api/auth/me');}catch(e){return;}
 if(USER.detail){logout();return;}
 $('#gate').style.display='none';$('#appwrap').style.display='flex';
 // 导航(管理员多一个题库管理)
 let nav=[['home','🤖','AI助教(首页)'],['practice','✏️','刷题练习'],['wrong','📕','错题本'],
   ['fav','⭐','收藏夹'],['news','📰','考试资讯'],['stats','📊','学习数据'],['membership','💎','会员中心']];
 if(USER.role===1)nav.push(['admin','🔑','题库管理']);
 $('#nav').innerHTML=nav.map(n=>`<a data-v="${n[0]}"><span class="ico">${n[1]}</span>${n[2]}</a>`).join('');
 $('#nav').onclick=e=>{const a=e.target.closest('a');if(a)go(a.dataset.v);};
 const badge=USER.is_member?'<span class="badge">会员</span>':'';
 $('#me-name').innerHTML=`👤 ${esc(USER.nickname)} ${badge}${USER.role===1?' · 管理员':''}`;
 go('home');
}

/* ---------- 题目解析:拆出题干 + 选项 ---------- */
function parseQ(content){
 let s=esc(content||'').replace(/^\s*\d{1,3}[\.、．]\s*/,'').replace(/\s*\d{1,3}[\.、．]\s*(?=A[\.、．])/,' ');
 const m=s.match(/[ABCD][\.、．]/);
 if(!m)return{stem:s.trim(),options:[]};
 const idx=s.indexOf(m[0]);
 const stem=s.slice(0,idx).trim();
 const opts=[];const r=/([ABCD])[\.、．]\s*([\s\S]*?)(?=[ABCD][\.、．]|$)/g;let mm;
 while((mm=r.exec(s.slice(idx))))opts.push({k:mm[1],t:mm[2].trim()});
 return{stem,options:opts};
}
/* ---------- 题卡(选项点击作答) ---------- */
function qCard(q,opts={}){
 const p=parseQ(q.content);
 let h=`<div class="q" id="q${q.id}">`;
 if(q.material_text||(q.material_images&&q.material_images.length)){h+='<div class="mat">';
   if(q.material_text)h+='【材料】'+esc(q.material_text).slice(0,500);
   for(const im of (q.material_images||[]))h+=`<img src="${im}">`;h+='</div>';}
 h+=`<div>`;
 if(q.category_l2||q.category_l1)h+=`<span class="tag">${q.category_l2||q.category_l1}</span>`;
 if(q.knowledge_point)h+=`<span class="tag" style="background:#efe7d8;color:#8a6d3b">${esc(q.knowledge_point)}</span>`;
 if(q.difficulty)h+=`<span class="tag diff">${['','易','中','难'][q.difficulty]||''}</span>`;
 if(q.match!=null)h+=`<span class="tag" style="background:#eafaf0;color:#15803d">匹配${Math.round(q.match*100)}%</span>`;
 if(opts.wrongCount)h+=`<span class="tag" style="background:#fdeeec;color:#b91c1c">错${opts.wrongCount}次</span>`;
 h+=`<span class="star ${q.favorited?'on':''}" onclick="toggleFav(${q.id},this)">${q.favorited?'★':'☆'}</span></div>`;
 h+=`<div class="stem">${p.stem.replace(/\n/g,'<br>')}</div>`;
 for(const im of (q.images||[]))h+=`<img src="${im}">`;
 // 选项:解析出则逐项点击;图片选项无文字则给 A/B/C/D 点击位
 let list=p.options;
 if(!list.length && q.has_image)list=['A','B','C','D'].map(k=>({k,t:''}));
 if(opts.answer!==false && list.length){
   h+=`<div class="opts" id="opts${q.id}">`;
   for(const o of list)h+=`<div class="opt" onclick="pickOpt(${q.id},'${o.k}',this)"><b>${o.k}</b>${esc(o.t)}</div>`;
   h+='</div>';
 }
 h+=`<div class="q-foot"><button class="btn sm ghost" onclick="findSim(${q.id})">🔍 找相似</button>`;
 if(opts.master)h+=`<button class="btn sm ok" onclick="masterQ(${q.id})">✓ 已掌握</button>`;
 h+=`</div><div id="r${q.id}"></div></div>`;return h;
}
async function toggleFav(id,el){const fd=new FormData();fd.append('question_id',id);
 const r=await j('/api/favorite/toggle',{method:'POST',body:fd});
 el.textContent=r.favorited?'★':'☆';el.classList.toggle('on',r.favorited);toast(r.favorited?'已收藏':'已取消');}
async function pickOpt(id,k,el){
 const box=$('#opts'+id);if(box.classList.contains('done'))return;
 box.classList.add('done');el.classList.add('sel');
 const fd=new FormData();fd.append('question_id',id);fd.append('user_answer',k);
 const r=await j('/api/practice/submit',{method:'POST',body:fd});const res=$('#r'+id);
 if(r.has_answer===false||r.correct===null){
   res.className='res info';res.innerHTML='📝 已记录作答(本题答案暂未录入)。'+(r.explanation?'<br>解析:'+esc(r.explanation):'');return;}
 // 标记正确/错误选项
 [...box.children].forEach(c=>{const ck=c.querySelector('b').textContent;
   if(ck===(r.answer||'').toUpperCase())c.classList.add('correct');});
 if(r.correct){res.className='res ok';res.innerHTML='✅ 回答正确！'+(r.explanation?'<br>解析:'+esc(r.explanation):'');}
 else{el.classList.remove('sel');el.classList.add('wrong');
   res.className='res bad';res.innerHTML=`❌ 错误,已加入错题本。`+(r.explanation?'<br>解析:'+esc(r.explanation):'');}
}
async function findSim(id){const box=$('#r'+id);box.className='res info';box.innerHTML='检索中…';
 const r=await j('/api/practice/similar/'+id);
 if(r.detail){box.innerHTML='💎 '+r.detail+' <button class="btn sm gold" onclick="go(\'membership\')">去开通</button>';return;}
 if(!r.count){box.innerHTML='暂无足够相似的题。';return;}
 let h='<b>📎 考点相似题:</b>';for(const q of r.items)h+=`<div style="margin-top:6px">·(相似度${(1-q.distance).toFixed(2)}) ${esc(q.content).slice(0,50)}…</div>`;box.innerHTML=h;}
async function masterQ(id){const fd=new FormData();fd.append('question_id',id);
 await j('/api/wrongbook/master',{method:'POST',body:fd});$('#q'+id).style.display='none';toast('已移出错题本');}

/* ---------- 视图 ---------- */
const V={};
let AI_HIST=[];
/* 首页 = 左 AI 对话 + 右"我的题库"(Claude project 两栏布局) */
V.home=async()=>{AI_HIST=[];let s={},mine={count:0,items:[]};
 try{s=await j('/api/stats');}catch(e){}
 try{mine=await j('/api/mine/list');}catch(e){}
 const hr=new Date().getHours();const greet=hr<11?'早上好':hr<14?'中午好':hr<18?'下午好':'晚上好';
 const pills=`<span class="pill">⏳ 距${s.exam_name||'考试'} ${s.exam_days_left!=null?s.exam_days_left:'—'}天</span><span class="pill">🔥 连续${s.streak||0}天</span><span class="pill">今日 ${s.today_count||0} 题</span>`;
 const sug=['帮我找几道图形推理题练练','行程问题的相遇追及怎么秒解?','资料分析的增长率怎么算最快','类比推理有哪些常见关系?'];
 const up=s.is_member?'':`<div class="upsell" style="margin-top:14px"><div>💎 开通会员:AI解析不限量 · 私有题库扩容 · 模拟考试</div><button class="btn gold" onclick="go('membership')">立即开通</button></div>`;
 const ov=`<div class="ovrow"><span>⏳ 距${s.exam_name||'考试'}</span><b>${s.exam_days_left!=null?s.exam_days_left:'—'} 天</b></div>
   <div class="ovrow"><span>🔥 连续打卡</span><b>${s.streak||0} 天</b></div>
   <div class="ovrow"><span>📝 今日已做</span><b>${s.today_count||0} 题</b></div>
   <div class="ovrow"><span>📚 累计做题</span><b>${s.done||0} 题</b></div>
   <div class="ovrow"><span>✅ 总正确率</span><b>${s.accuracy==null?'—':s.accuracy+'%'}</b></div>
   <div class="ovrow"><span>📕 待复习错题</span><b>${s.wrong||0}</b></div>`;
 return `<div class="proj">
  <div class="proj-main">
   <div style="margin:2px 0 14px"><div class="serif" style="font-size:26px;font-weight:600">${greet},今天也要上岸 👋</div>
    <div class="muted" style="margin-top:8px">我是你的行测 AI 助教 · 贴题分析考点 + 动态推荐对应题</div></div>
   <div class="hcard">
     <div class="chatlog" id="chatlog"></div>
     <div class="chatbox"><textarea id="chatin" placeholder="贴一道题让我分析考点+找相似题,或问我任何行测问题…(Enter 发送)"></textarea>
      <div style="display:flex;flex-direction:column;gap:6px"><button class="btn" onclick="aiSend()">发送</button><button class="btn gray sm" onclick="aiSaveMine()">📤 存我的库</button></div></div>
     <div class="ana" id="suglist" style="margin-top:12px">${sug.map(t=>`<span class="chip" onclick="suggest('${t}')">${t}</span>`).join('')}</div>
   </div>${up}
  </div>
  <aside class="proj-side">
   <div id="artifact"></div>
   <div class="card"><b class="serif" style="font-size:15px">📈 学习概况</b><div style="margin-top:10px">${ov}</div></div>
   <div class="card" id="minepanel">${minePanel(mine,s)}</div>
  </aside>
 </div>`;};
function minePanel(mine,s){
 const isM=s.is_member;const cap=isM?3000:50;const pct=Math.min(100,Math.round(mine.count/cap*100));
 let h=`<div style="display:flex;justify-content:space-between;align-items:center"><b>📚 我的题库</b><button class="btn sm ghost" onclick="$('#chatin')&&$('#chatin').focus()">+ 上传</button></div>`;
 h+=`<div style="margin-top:8px;font-size:13px">已上传 <b style="font-size:18px;color:var(--blue)">${mine.count}</b> 题 <span class="muted">/ ${isM?'不限':cap}</span></div>`;
 h+=`<div class="cap"><i style="width:${pct}%"></i></div>`;
 h+=`<div class="muted" style="font-size:11px;margin-bottom:6px">${isM?'会员私有库':'免费版上限'+cap+'题,会员可扩容'}</div>`;
 if(!mine.count){h+=`<div class="mine-empty">还没上传题目<br>在左侧贴一道题,点「📤 存我的库」即可收藏到这里</div>`;}
 else{for(const q of mine.items.slice(0,30))h+=`<div class="mine-it" onclick="askMine(${q.id})"><span class="mtag">${esc(q.category_l2||q.category_l1||'题')}</span><span>${esc((q.content||'').replace(/\s+/g,'').slice(0,26))}…</span></div>`;}
 return h;
}
async function refreshMine(){let mine={count:0,items:[]},s={};try{mine=await j('/api/mine/list');}catch(e){}try{s=await j('/api/stats');}catch(e){}const p=$('#minepanel');if(p)p.innerHTML=minePanel(mine,s);}
async function askMine(id){bubble('me','🔍 找与我上传的这道题相似的题');const wait=bubble('ai','检索中…');
 try{const r=await j('/api/practice/similar/'+id);
   if(r.detail){wait.innerHTML='💎 '+r.detail;return;}
   if(!r.count){wait.innerHTML='题库里暂无足够相似的题(题库越大越准)。';return;}
   wait.innerHTML='为你找到 '+r.count+' 道考点相似的题:';
   const box=document.createElement('div');box.innerHTML=r.items.map(q=>qCard(q,{answer:true})).join('');$('#chatlog').appendChild(box);$('#chatlog').scrollTop=$('#chatlog').scrollHeight;renderArtifact(r.items);
 }catch(e){wait.innerHTML='出错:'+e;}}
function suggest(t){const inp=$('#chatin');if(!inp)return;inp.value=t;aiSend();}
/* 右侧 artifact:把对话推荐的题整理成可下载 PDF(类 Claude artifact) */
let LAST_ITEMS=[];
function renderArtifact(items){const el=$('#artifact');if(!el)return;
 if(!items||!items.length){return;}LAST_ITEMS=items;
 let h=`<div class="artifact"><h4 class="serif">📄 本次题目集 · ${items.length} 道</h4>
  <div class="muted" style="font-size:12px;margin-bottom:8px">AI 为你整理 · 可下载成 PDF 打印练习</div>
  <button class="btn sm" style="width:100%" onclick="exportPDF()">⬇ 下载 PDF(含答案页)</button>
  <div style="margin-top:8px">`;
 for(const q of items)h+=`<div class="art-it">${esc((q.content||'').replace(/\s+/g,'').slice(0,28))}…</div>`;
 el.innerHTML=h+'</div></div>';}
async function exportPDF(){if(!LAST_ITEMS.length){toast('没有可下载的题');return;}
 toast('正在生成 PDF…');
 const r=await fetch('/api/export/pdf',{method:'POST',headers:{'content-type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify(LAST_ITEMS.map(q=>q.id))});
 if(!r.ok){toast('生成失败');return;}
 const blob=await r.blob();const url=URL.createObjectURL(blob);
 const a=document.createElement('a');a.href=url;a.download='行测题目集.pdf';a.click();URL.revokeObjectURL(url);toast('已下载');}
function bubble(cls,html){const log=$('#chatlog');const d=document.createElement('div');d.className='bub '+cls;d.innerHTML=html;log.appendChild(d);log.scrollTop=log.scrollHeight;return d;}
async function aiSend(){const inp=$('#chatin');const msg=inp.value.trim();if(!msg)return;
 const sl=$('#suglist');if(sl)sl.style.display='none';
 inp.value='';bubble('me',esc(msg));AI_HIST.push({role:'user',content:msg});
 const wait=bubble('ai','思考中…');
 try{const r=await j('/api/ai/ask',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({message:msg,history:AI_HIST})});
   let h=esc(r.reply||'');AI_HIST.push({role:'assistant',content:r.reply||''});
   if(r.analysis&&r.analysis.l1){h+='<div class="ana">'+[r.analysis.l1,r.analysis.l2,r.analysis.l3,r.analysis.kp].filter(Boolean).map(x=>`<span class="tag">${esc(x)}</span>`).join('')+'</div>';}
   wait.innerHTML=h;
   if(r.items&&r.items.length){const box=document.createElement('div');box.innerHTML='<div class="muted" style="margin:8px 0 2px">📎 为你推荐 '+r.items.length+' 道对应的题(右侧可下载 PDF):</div>'+r.items.map(q=>qCard(q,{answer:true})).join('');$('#chatlog').appendChild(box);$('#chatlog').scrollTop=$('#chatlog').scrollHeight;renderArtifact(r.items);}
 }catch(e){wait.innerHTML='出错了:'+e;}}
async function aiSaveMine(){const inp=$('#chatin');const c=inp.value.trim();if(c.length<8){toast('请先粘贴一道完整的题');return;}
 inp.value='';bubble('me','📤 上传我的题:<br>'+esc(c).slice(0,80)+'…');const wait=bubble('ai','分析入库中…');
 try{const fd=new FormData();fd.append('content',c);const r=await j('/api/mine/add',{method:'POST',body:fd});
   let h='已存入你的私有题库 ✅';if(r.analysis)h+='<div class="ana">'+[r.analysis.l1,r.analysis.l2,r.analysis.l3,r.analysis.kp].filter(Boolean).map(x=>`<span class="tag">${esc(x)}</span>`).join('')+'</div>';
   wait.innerHTML=h;refreshMine();
   if(r.items&&r.items.length){const box=document.createElement('div');box.innerHTML='<div class="muted" style="margin:8px 0 2px">📎 找到 '+r.items.length+' 道对应/相似的题(右侧可下载 PDF):</div>'+r.items.map(q=>qCard(q,{answer:true})).join('');$('#chatlog').appendChild(box);renderArtifact(r.items);}
 }catch(e){wait.innerHTML='出错了:'+e;}}

const L1S=["言语理解","数量关系","判断推理","资料分析","常识判断","政治理论"];
const L2S={"判断推理":["图形推理","定义判断","类比推理","逻辑判断"],"言语理解":["逻辑填空","片段阅读"]};
let SEL={l1:"",l2:""};
V.practice=async()=>{let chips=`<span class="chip ${SEL.l1==''?'on':''}" onclick="pick('l1','')">全部题型</span>`;
 for(const x of L1S)chips+=`<span class="chip ${SEL.l1==x?'on':''}" onclick="pick('l1','${x}')">${x}</span>`;
 let sub='';if(L2S[SEL.l1]){sub='<div style="margin-top:8px">';for(const x of L2S[SEL.l1])sub+=`<span class="chip ${SEL.l2==x?'on':''}" onclick="pick('l2','${x}')">${x}</span>`;sub+='</div>';}
 setTimeout(loadQuiz,0);
 return `<h2 class="page">刷题练习</h2><div class="card"><b>选择题型</b><div style="margin-top:10px">${chips}</div>${sub}
   <div style="margin-top:10px">数量 <select id="lim"><option>5</option><option>10</option><option>20</option></select> <button class="btn" onclick="loadQuiz()">换一批</button></div></div>
   <div id="quiz"><div class="card muted center">加载中…</div></div>`;};
function pick(k,v){SEL[k]=v;if(k=='l1')SEL.l2='';render('practice');}
async function loadQuiz(){const lim=$('#lim')?$('#lim').value:5;
 const r=await j(`/api/practice/questions?l1=${encodeURIComponent(SEL.l1)}&l2=${encodeURIComponent(SEL.l2)}&limit=${lim}&exclude_done=false`);
 const box=$('#quiz');if(!r.count){box.innerHTML='<div class="card muted center">该题型暂无已确认的题。</div>';return;}
 box.innerHTML=r.items.map(q=>qCard(q,{answer:true})).join('');}
V.wrong=async()=>{const r=await j('/api/wrongbook');
 const body=r.count?r.items.map(q=>qCard(q,{answer:true,master:true,wrongCount:q.wrong_count})).join(''):'<div class="card muted center">错题本是空的,继续加油 💪</div>';
 return `<h2 class="page">错题本 <span class="muted" style="font-size:14px">共 ${r.count} 题</span></h2>${body}`;};
V.fav=async()=>{const r=await j('/api/favorite/list');
 const body=r.count?r.items.map(q=>qCard(q,{answer:true})).join(''):'<div class="card muted center">还没有收藏,刷题时点 ☆ 收藏。</div>';
 return `<h2 class="page">收藏夹 <span class="muted" style="font-size:14px">共 ${r.count} 题</span></h2>${body}`;};
V.news=async()=>{const r=await j('/api/news');let h='';
 for(const n of r.items)h+=`<div class="news-it"><span class="cat">${n.category}</span><div><b>${esc(n.title)}</b><div class="muted" style="font-size:12px;margin:3px 0">${n.date}</div><div style="color:#555">${esc(n.summary||n.content).slice(0,200)}</div>${n.url?`<a href="${n.url}" target="_blank" class="muted">原文链接 →</a>`:''}</div></div>`;
 if(!h)h='<div class="muted center">暂无资讯,管理员可在「题库管理」发布</div>';
 return `<h2 class="page">考试资讯</h2><div class="card">${h}</div>`;};
V.stats=async()=>{const s=await j('/api/stats');const acc=s.accuracy==null?'—':s.accuracy+'%';
 let cats='';for(const c of (s.by_category||[]).sort((a,b)=>b.done-a.done)){const p=c.accuracy==null?0:c.accuracy;
   cats+=`<div class="barrow"><span class="nm">${c.name}</span><div class="bar" style="flex:1"><i style="width:${p}%"></i></div><span class="pct">${c.accuracy==null?c.done+'题':p+'%'}</span></div>`;}
 if(!cats)cats='<div class="muted center">还没刷题,去刷题练习开始吧</div>';
 const mx=Math.max(1,...(s.trend||[]).map(t=>t.count));let tr='';
 for(const t of (s.trend||[]))tr+=`<div class="col"><div class="bk" style="height:${t.count/mx*72}px"></div><div class="dt">${t.date}</div></div>`;
 return `<h2 class="page">学习数据</h2>
 <div class="grid g2">
   <div class="card hero"><div class="sub">距 ${s.exam_name||'目标考试'} 还有</div><div class="days">${s.exam_days_left!=null?s.exam_days_left:'—'} <span style="font-size:18px">天</span></div><div class="sub">📅 坚持每天练,稳步上岸</div></div>
   <div class="grid g2" style="margin:0">
     <div class="stat"><div class="n gold">🔥 ${s.streak}</div><div class="l">连续打卡(天)</div></div>
     <div class="stat"><div class="n blue">${s.today_count}</div><div class="l">今日已做</div></div>
     <div class="stat"><div class="n">${s.done}</div><div class="l">累计做题</div></div>
     <div class="stat"><div class="n ok">${acc}</div><div class="l">总正确率</div></div></div></div>
 <div class="grid g2">
   <div class="card"><b>📊 各题型掌握度</b><div style="margin-top:10px">${cats}</div></div>
   <div class="card"><b>📈 近 7 天做题量</b><div class="trend">${tr}</div></div></div>
 <div class="grid g4">
   <div class="stat" style="cursor:pointer" onclick="go('practice')"><div class="n blue">${s.total_q}</div><div class="l">题库可练 →</div></div>
   <div class="stat" style="cursor:pointer" onclick="go('wrong')"><div class="n bad">${s.wrong}</div><div class="l">错题待复习 →</div></div>
   <div class="stat" style="cursor:pointer" onclick="go('fav')"><div class="n gold">${s.favorite}</div><div class="l">收藏题 →</div></div>
   <div class="stat"><div class="n">${s.active_days}</div><div class="l">学习天数</div></div></div>`;};
V.membership=async()=>{const r=await j('/api/membership/plans');let cards='';
 for(const p of r.plans){const hot=p.level===1?'hot':'';
   cards+=`<div class="plan ${hot}"><h3>${p.name}</h3><div class="price">¥${p.price}<small>/${p.level===1?'月':'年'}</small></div>
   <ul>${p.perks.map(x=>`<li>✓ ${x}</li>`).join('')}</ul>
   <button class="btn gold" onclick="upgrade(${p.level})">${r.is_member?'续费':'开通'}</button></div>`;}
 const status=r.is_member?`<div class="card" style="background:#fff8ec">💎 你已是会员${r.expire?',到期 '+r.expire:''}。`+(r.beta_free?' (内测期全员免费体验)':'')+'</div>':'';
 const beta=r.beta_free?'<div class="card muted">🎁 内测期:所有会员功能现在<b>免费开放</b>,点开通即可体验完整权益。正式上线后将按下方价格收费。</div>':'';
 return `<h2 class="page">会员中心</h2>${status}${beta}<div class="grid g2">${cards}</div>`;};
async function upgrade(level){const fd=new FormData();fd.append('level',level);
 const r=await j('/api/membership/upgrade',{method:'POST',body:fd});
 if(r.ok){USER=r.user;toast('开通成功！');render('membership');}else toast(r.detail||'失败');}

V.admin=async()=>{setTimeout(()=>{loadPending();},0);
 return `<h2 class="page">题库管理 <span class="muted" style="font-size:13px">(管理员)</span></h2>
 <div class="card"><b>① 上传真题 PDF</b><div style="margin-top:10px"><input type="file" id="pdf" accept=".pdf"> <button class="btn" onclick="upload()">上传入库</button></div><div id="upmsg" class="muted" style="margin-top:8px"></div></div>
 <div class="card"><b>② 发布考试资讯</b><div style="margin-top:10px">
   <input id="nt" placeholder="标题" style="width:60%"> <select id="nc"><option>资讯</option><option>公告</option><option>考试时间</option></select><br>
   <input id="ns" placeholder="摘要/内容" style="width:80%;margin-top:6px"> <input id="nu" placeholder="原文链接(选填)" style="width:40%">
   <button class="btn" onclick="addNews()">发布</button></div></div>
 <div class="card"><b>③ 待确认题</b> <button class="btn sm ghost" onclick="loadPending()">刷新</button><div id="pending" style="margin-top:10px"></div></div>`;};
async function upload(){const f=$('#pdf').files[0];if(!f){toast('请选 PDF');return;}
 const fd=new FormData();fd.append('file',f);$('#upmsg').textContent='上传中…';
 const r=await j('/api/ingest/upload',{method:'POST',body:fd});if(r.detail){$('#upmsg').textContent='错误:'+r.detail;return;}pollJob(r.job_id);}
async function pollJob(id){const r=await j('/api/ingest/job/'+id);const st=['待处理','解析中','入库中','完成','失败'][r.status];
 $('#upmsg').innerHTML=`任务${id} [${st}] <div class="bar" style="width:200px;display:inline-block;vertical-align:middle"><i style="width:${r.progress}%"></i></div> ${r.progress}% · 共${r.total}题 入${r.done} 重复${r.dup} ${r.error||''}`;
 if(r.status<3)setTimeout(()=>pollJob(id),1500);else{toast('入库完成');loadPending();}}
async function addNews(){const fd=new FormData();fd.append('title',$('#nt').value);fd.append('summary',$('#ns').value);fd.append('content',$('#ns').value);fd.append('category',$('#nc').value);fd.append('url',$('#nu').value);
 const r=await j('/api/news',{method:'POST',body:fd});if(r.id){toast('已发布');$('#nt').value='';$('#ns').value='';}}
async function loadPending(){const r=await j('/api/review/pending?limit=100');const box=$('#pending');
 if(!r.count){box.innerHTML='<span class="muted">暂无待确认题</span>';return;}
 let h=`<div class="muted" style="margin-bottom:8px">共 ${r.count} 道待确认</div>`;
 for(const q of r.items){h+=`<div class="q" id="q${q.id}">`;
   if(q.material_text||(q.material_images||[]).length){h+='<div class="mat">';if(q.material_text)h+='【材料】'+esc(q.material_text).slice(0,300);for(const im of(q.material_images||[]))h+=`<img src="${im}">`;h+='</div>';}
   h+=`<span class="tag">${q.category_l2||q.category_l1}</span><span class="muted">置信${q.confidence} · #${q.id}</span><div class="stem">${showQ(q.content)}</div>`;
   for(const im of (q.images||[]))h+=`<img src="${im}">`;
   h+=`<div class="q-foot"><button class="btn sm ok" onclick="conf(${q.id},true)">✔ 通过</button><button class="btn sm bad" onclick="conf(${q.id},false)">✖ 删除</button></div></div>`;}
 box.innerHTML=h;}
async function conf(id,ok){await j('/api/review/confirm?approve='+ok,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify([id])});
 const el=$('#q'+id);if(el)el.style.display='none';toast(ok?'已通过':'已删除');}

/* ---------- 路由 ---------- */
async function render(v){$('#main').innerHTML='<div class="card muted center">加载中…</div>';
 try{$('#main').innerHTML=await V[v]();}catch(e){$('#main').innerHTML='<div class="card">加载失败:'+e+'</div>';}}
function go(v){[...document.querySelectorAll('#nav a')].forEach(a=>a.classList.toggle('on',a.dataset.v===v));render(v);}
document.addEventListener('click',e=>{if(e.target.matches('.q img'))e.target.classList.toggle('zoom');});
document.addEventListener('keydown',e=>{if(e.target.id==='chatin'&&e.key==='Enter'&&!e.shiftKey){e.preventDefault();aiSend();}});
$('#g-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});

/* 启动 */
if(TOKEN)boot();
</script>
</body>
</html>
