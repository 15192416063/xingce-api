<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="580" fill="#ffffff"/>
<text x="40" y="28" font-size="14" font-weight="500" fill="#2c2c2a">行测相似题检索系统 · 数据流</text>

<text x="40" y="58" font-size="12" fill="#5f5e5a">① 入库流程（上传时，一次性）</text>
<rect x="40" y="70" width="120" height="50" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text x="100" y="92" font-size="13" font-weight="500" fill="#633806" text-anchor="middle">PDF 上传</text>
<text x="100" y="108" font-size="11" fill="#854F0B" text-anchor="middle">管理员/用户</text>
<line x1="160" y1="95" x2="196" y2="95" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="198" y="70" width="120" height="50" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text x="258" y="92" font-size="13" font-weight="500" fill="#633806" text-anchor="middle">切题（过滤图形题）</text>
<line x1="318" y1="95" x2="354" y2="95" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="356" y="70" width="130" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="421" y="92" font-size="13" font-weight="500" fill="#085041" text-anchor="middle">提炼考点摘要 ⭐</text>
<line x1="486" y1="95" x2="522" y2="95" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="524" y="70" width="116" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="582" y="92" font-size="13" font-weight="500" fill="#085041" text-anchor="middle">算 embedding</text>
<line x1="582" y1="120" x2="582" y2="155" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="486" y="142" font-size="11" fill="#5f5e5a">打 scope 标记</text>
<rect x="160" y="158" width="420" height="74" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="370" y="182" font-size="13" font-weight="500" fill="#3C3489" text-anchor="middle">向量数据库</text>
<text x="370" y="202" font-size="11" fill="#534AB7" text-anchor="middle">公共题库 scope=public ＋ 私有题库 scope=user:xxx</text>
<text x="370" y="220" font-size="11" fill="#534AB7" text-anchor="middle">每条向量带 scope 标记，是隔离与检索过滤的依据</text>

<text x="40" y="280" font-size="12" fill="#5f5e5a">② 检索流程（每次搜索）</text>
<rect x="40" y="294" width="130" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="105" y="316" font-size="13" font-weight="500" fill="#712B13" text-anchor="middle">用户输入题目/主题</text>
<line x1="170" y1="319" x2="206" y2="319" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="208" y="294" width="150" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="283" y="316" font-size="13" font-weight="500" fill="#085041" text-anchor="middle">提炼考点+算向量</text>
<line x1="358" y1="319" x2="394" y2="319" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="396" y="294" width="244" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="518" y="316" font-size="13" font-weight="500" fill="#3C3489" text-anchor="middle">按 scope 过滤检索（公共+本人私有）</text>
<line x1="518" y1="344" x2="518" y2="376" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="396" y="378" width="244" height="62" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="518" y="400" font-size="13" font-weight="500" fill="#712B13" text-anchor="middle">返回 Top-K 相似题</text>
<text x="518" y="420" font-size="11" fill="#993C1D" text-anchor="middle">超过阈值则提示"未找到"</text>

<text x="40" y="470" font-size="11" fill="#5f5e5a">关键：检索按 scope 过滤——A 用户搜不到 B 的私有题（隐私红线）；</text>
<text x="40" y="490" font-size="11" fill="#5f5e5a">公共库全员可搜，故内容来源必须干净（原创/AI生成/正版采购）。</text>
<text x="40" y="510" font-size="11" fill="#5f5e5a">关键：入库的贵操作（提炼考点、图推多模态）只做一次并落库，检索只做轻量向量化——成本可控核心。</text>
</svg>
